<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailGuard AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#121212;
            color:white;
            font-family:Arial, sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:900px;
            max-width:100%;
            background:#1e1e1e;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 25px rgba(0,212,255,0.25);
        }

        h1{
            text-align:center;
            color:#00d4ff;
            margin-bottom:10px;
            font-size:42px;
        }

        .subtitle{
            text-align:center;
            color:#bdbdbd;
            margin-bottom:30px;
        }

        textarea{
            width:100%;
            height:220px;
            background:#2a2a2a;
            color:white;
            border:2px solid #333;
            border-radius:12px;
            padding:15px;
            font-size:16px;
            resize:none;
        }

        textarea:focus{
            outline:none;
            border-color:#00d4ff;
            box-shadow:0px 0px 12px #00d4ff;
        }

        .btn{
            width:100%;
            margin-top:20px;
            padding:15px;
            background:#00d4ff;
            color:black;
            border:none;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        .btn:hover{
            background:#00a8cc;
        }

        .result-box{
            margin-top:30px;
            padding:25px;
            background:#252525;
            border-radius:15px;
            border:1px solid #444;
        }

        .prediction{
            font-size:32px;
            font-weight:bold;
            text-align:center;
        }

        .confidence{
            margin-top:15px;
            text-align:center;
            font-size:22px;
            color:#00ff99;
        }

        .risk{
            margin-top:15px;
            text-align:center;
            font-size:24px;
            font-weight:bold;
        }

        .footer{
            margin-top:30px;
            text-align:center;
            color:#888;
            font-size:14px;
        }

        .safe{
            color:#00ff99;
        }

        .spam{
            color:#ffc107;
        }

        .phishing{
            color:#ff4d4d;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🛡 MailGuard AI</h1>

    <div class="subtitle">
        Email Spam & Phishing Detection System
    </div>

    <form action="/predict" method="POST">

        <textarea
            name="email"
            placeholder="Paste email content here..."
        >{{ email if email else '' }}</textarea>

        <button class="btn" type="submit">
            🔍 Scan Email
        </button>

    </form>

    {% if prediction %}

    <div class="result-box">

        {% if prediction == "ham" %}

            <div class="prediction safe">
                ✅ SAFE EMAIL
            </div>

        {% elif prediction == "spam" %}

            <div class="prediction spam">
                ⚠️ SPAM EMAIL
            </div>

        {% else %}

            <div class="prediction phishing">
                🚨 PHISHING EMAIL
            </div>

        {% endif %}

        <div class="confidence">
            Confidence Score: {{ confidence }}%
        </div>

        <div class="risk">
            {{ risk }}
        </div>

    </div>

    {% endif %}

    <div class="footer">
        Machine Learning • Cybersecurity
    </div>

</div>

</body>
</html>
